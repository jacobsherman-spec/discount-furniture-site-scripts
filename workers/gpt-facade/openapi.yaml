openapi: 3.1.0
info:
  title: Discount Furniture GPT Facade
  version: 0.1.0
servers:
  - url: https://discount-furniture-gpt-facade.jacobsherman.workers.dev
paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /read:
    post:
      operationId: readDiscountFurnitureData
      x-openai-isConsequential: false
      summary: Read-only dispatcher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ReadRequest'
                - type: object
                  properties: {}
                  additionalProperties: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /preview:
    post:
      operationId: previewDiscountFurnitureUpdate
      x-openai-isConsequential: false
      summary: Non-consequential preview dispatcher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PreviewRequest'
                - type: object
                  properties: {}
                  additionalProperties: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
  /write:
    put:
      operationId: writeDiscountFurnitureUpdate
      x-openai-isConsequential: true
      summary: Consequential write dispatcher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/WriteRequest'
                - type: object
                  properties: {}
                  additionalProperties: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: true
components:
  schemas:
    ReadRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum:
            - searchProducts
            - getProductById
            - getProductInventory
            - getProductInventoryLevels
            - listBrands
            - listSuppliers
            - listOutlets
            - listGitHubBrandTemplates
            - getGitHubBrandTemplate
            - getGitHubTemplateRegistry
            - getGitHubTemplateReadme
            - listGitHubBrandAssets
            - getGitHubTemplateFile
            - getGptOperatingManual
            - getProductPricingHistory
            - catalogReport
            - auditHealth
            - listDescriptionUpdates
            - getDescriptionUpdate
            - getProductDescriptionHistory
        productId:
          type: string
        limit:
          type: integer
        historyId:
          type: string
      additionalProperties: true
    PreviewRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum:
            - pricing_update
            - pricing_rollback
            - price_list_import
        productId:
          type: string
        price_update_type:
          type: string
          enum: [supplier_price, retail_price]
        supplier_price:
          type: number
        retail_price:
          type: number
        product_supplier_id:
          type: string
        supplier_id:
          type: string
        price_book_id:
          type: string
        price_book_product_id:
          type: string
        confirm_sku:
          type: string
        history_id:
          type: string
        batch_id:
          type: string
        approved_rows:
          type: string
        approved_row_ids:
          type: array
          items:
            type: string
        supplier_name:
          type: string
        file_name:
          type: string
        rows:
          type: array
          items:
            type: object
            properties:
              row_number:
                type: integer
              sku:
                type: string
              supplier_code:
                type: string
              product_name:
                type: string
              brand:
                type: string
              supplier_price:
                type: number
              retail_price:
                type: number
            additionalProperties: true
        options:
          type: object
          properties:
            update_supplier_price:
              type: boolean
            update_retail_price:
              type: boolean
            create_missing_products:
              type: boolean
            match_by:
              type: array
              items:
                type: string
          additionalProperties: true
      additionalProperties: true
    WriteRequest:
      type: object
      required: [type, approved]
      properties:
        type:
          type: string
          enum:
            - pricing_update
            - pricing_rollback
            - price_list_import
        productId:
          type: string
        approved:
          type: boolean
        price_update_type:
          type: string
          enum: [supplier_price, retail_price]
        supplier_price:
          type: number
        retail_price:
          type: number
        product_supplier_id:
          type: string
        supplier_id:
          type: string
        price_book_id:
          type: string
        price_book_product_id:
          type: string
        expected_current_price_hash:
          type: string
        approved_by:
          type: string
        approval_note:
          type: string
        history_id:
          type: string
        batch_id:
          type: string
        approved_rows:
          type: string
        approved_row_ids:
          type: array
          items:
            type: string
        supplier_name:
          type: string
        file_name:
          type: string
        rows:
          type: array
          items:
            type: object
            properties:
              row_number:
                type: integer
              sku:
                type: string
              supplier_code:
                type: string
              product_name:
                type: string
              brand:
                type: string
              supplier_price:
                type: number
              retail_price:
                type: number
            additionalProperties: true
        options:
          type: object
          properties:
            update_supplier_price:
              type: boolean
            update_retail_price:
              type: boolean
            create_missing_products:
              type: boolean
            match_by:
              type: array
              items:
                type: string
          additionalProperties: true
      additionalProperties: true
